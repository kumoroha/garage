<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20.25 BASEMENT GARAGE</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; margin: 0; padding: 10px; }
        #header { border-bottom: 2px solid #00ff41; padding: 5px; margin-bottom: 10px; font-size: 0.8em; }
        
        /* 入力エリアを上に持ってくる */
        #input-area { 
            display: flex; 
            margin-bottom: 20px; 
            background: #111; 
            padding: 10px; 
            border: 1px solid #333;
        }
        input { 
            flex: 1; 
            background: #000; 
            border: 1px solid #00ff41; 
            color: #00ff41; 
            padding: 10px; 
            font-size: 16px; /* 学タブでズームされないためのサイズ */
        }
        button { background: #00ff41; color: #000; border: none; padding: 0 15px; margin-left: 5px; cursor: pointer; font-weight: bold; }

        #chat-log { 
            height: 60vh; 
            overflow-y: auto; 
            background: rgba(0,20,0,0.5); 
            padding: 10px; 
            border: 1px solid #222;
        }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 4px; line-height: 1.4; }
        .user { color: #fff; border-left: 3px solid #fff; }
        .ai { color: #00ff41; border-left: 3px solid #00ff41; white-space: pre-wrap; }
        .system { color: #ff3333; background: rgba(255,0,0,0.1); }
    </style>
</head>
<body>

<div id="header">
    XE7740 OS: <span id="status">OFFLINE</span>
</div>

<div id="input-area">
    <input type="text" id="user-input" placeholder="ここに指令を打つ..." autocomplete="off">
    <button id="send-btn">送信</button>
</div>

<div id="chat-log">
    <div class="message ai">システム待機中... 認証キーを入力してください。</div>
</div>

<script>
    const API_KEY = prompt("認証キーを貼り付けてください");
    const statusEl = document.getElementById("status");
    const chatLog = document.getElementById("chat-log");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    if (API_KEY) {
        statusEl.innerText = "ONLINE";
        addMessage("認証成功。5090×8枚 起動完了。指示をどうぞ。", "ai");
    }

    async function handleChat() {
        const text = userInput.value.trim();
        if (!text || !API_KEY) return;

        addMessage(text, "user");
        userInput.value = "";

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY.trim()}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ 
                            text: `設定：地下ガレージの管理AI。まどマギ、リゼロ、リコリコ、ロシデレに詳しい。質問：${text}` 
                        }]
                    }]
                })
            });

            const data = await response.json();
            if (data.candidates) {
                addMessage(data.candidates[0].content.parts[0].text, "ai");
            } else {
                addMessage("ERROR: キーが無効か、通信エラーです。", "system");
            }
        } catch (error) {
            addMessage("SYSTEM ERROR: 通信遮断。", "system");
        }
    }

    function addMessage(content, role) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role}`;
        msgDiv.innerText = content;
        chatLog.appendChild(msgDiv);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    sendBtn.addEventListener("click", handleChat);
    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleChat(); });
</script>

</body>
</html>
