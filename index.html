<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20.25 LOCAL AI - XE7740</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; margin: 0; padding: 20px; }
        #status-bar { border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 10px; font-size: 0.8em; }
        #chat-log { height: 300px; overflow-y: auto; background: rgba(0,20,0,0.3); border: 1px solid #222; padding: 10px; margin-bottom: 10px; }
        #input-area { display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .ai { color: #00ff41; border-left: 3px solid #00ff41; padding-left: 10px; margin: 10px 0; white-space: pre-wrap; }
        .user { color: #fff; margin: 10px 0; }
        .progress-container { width: 100%; background: #222; height: 10px; margin: 10px 0; }
        #progress-bar { width: 0%; height: 100%; background: #00ff41; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="status-bar">
    SYSTEM: XE7740 LOCAL CORE | STATUS: <span id="status">INIT...</span>
</div>

<div id="progress-text">AIの脳をロード中... (初回は時間がかかります)</div>
<div class="progress-container"><div id="progress-bar"></div></div>

<div id="chat-log"></div>

<div id="input-area">
    <input type="text" id="user-input" placeholder="指令を入力..." disabled>
    <button id="send-btn" disabled>SEND</button>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const statusEl = document.getElementById("status");
    const progressText = document.getElementById("progress-text");
    const progressBar = document.getElementById("progress-bar");
    const chatLog = document.getElementById("chat-log");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    // 使用するモデル：もっとも軽量なLlama-3-8Bの圧縮版
    const selectedModel = "Llama-3-8B-Instruct-v0.1-q4f16_1-MLC";

    const engine = new webllm.MLCEngine();

    // ロード状況を表示するコールバック
    engine.setInitProgressCallback((report) => {
        progressText.innerText = report.text;
        const match = report.text.match(/(\d+)%/);
        if (match) {
            progressBar.style.width = match[0];
        }
        if (report.progress === 1) {
            statusEl.innerText = "READY";
            userInput.disabled = false;
            sendBtn.disabled = false;
            progressText.innerText = "ロード完了。地下ガレージAI起動。";
        }
    });

    async function handleChat() {
        const text = userInput.value;
        if (!text) return;

        addMessage(text, "user");
        userInput.value = "";

        const messages = [
            { role: "system", content: "あなたは地下ガレージの管理AIです。まどマギ、リゼロ、リコリコ、ロシデレに詳しい。短く簡潔に答えてください。" },
            { role: "user", content: text }
        ];

        try {
            const reply = await engine.chat.completions.create({ messages });
            addMessage(reply.choices[0].message.content, "ai");
        } catch (e) {
            addMessage("ERROR: メモリ不足か、WebGPUが非対応です。", "ai");
        }
    }

    function addMessage(content, role) {
        const msgDiv = document.createElement("div");
        msgDiv.className = role;
        msgDiv.innerText = content;
        chatLog.appendChild(msgDiv);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    sendBtn.onclick = handleChat;
    userInput.onkeypress = (e) => { if (e.key === "Enter") handleChat(); };

    // AIのロード開始
    engine.reload(selectedModel);
</script>

</body>
</html>
