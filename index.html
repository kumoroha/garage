<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20.25 BASEMENT-GARAGE UNIT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>SYSTEM STATUS</h2>
            <div class="status-item">
                <span class="label">UNIT:</span>
                <span class="value">XE7740-V3</span>
            </div>
            <div class="status-item">
                <span class="label">GPU:</span>
                <span class="value">RTX 5090 x 8</span>
            </div>
            <div class="status-item">
                <span class="label">VRAM:</span>
                <span class="value">256GB / 256GB</span>
            </div>
            <hr>
            <div class="archives">
                <p>TARGET DATA:</p>
                <ul>
                    <li>PUELLA MAGI</li>
                    <li>RE:ZERO</li>
                    <li>LYCORIS RECOIL</li>
                    <li>ROSHIDERE</li>
                </ul>
            </div>
        </aside>

        <main class="chat-area">
            <header>
                <h1>BASEMENT-GARAGE TERMINAL <span class="online-dot"></span></h1>
            </header>
            <div id="chat-log" class="chat-log">
                <div class="message system">SYSTEM: Connection Established. Welcome back, Operator.</div>
            </div>
            <div class="input-group">
                <input type="text" id="user-input" placeholder="地下サーバーへコマンドを入力...">
                <button id="send-btn">SEND</button>
            </div>
        </main>
    </div>
    <script type="importmap">
    {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
    }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
